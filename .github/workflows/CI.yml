# workflow to build and test fbpmn

# version 0.1 without cache
# (issue with stack not being installed in the .ghcup sub-directories)

name: fbpmn CI

on:
  push:
    branches: [master] 
  # schedule:
  #   - cron: '0 0 * * 0'
  # workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    env:
      GHC_VERSION: '9.2.8'
      STACK_LTS: '20.26'
      STACK_VERSION: '3.5.1'

    steps:
      - uses: actions/checkout@v4

      - name: install ghc ${{ env.GHC_VERSION }}
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          # cabal-version: 'latest' # 'latest' is default
          enable-stack: "true"
          stack-version: ${{ env.STACK_VERSION }} # 'latest' is default

      - name: build and test
        run: |
          stack build --test --system-ghc --no-terminal
